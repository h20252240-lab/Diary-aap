<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cottagecore Diary & Study Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Cute+Font&family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #e8e4d9;
            --point-green: #5d7c5a;
            --accent-brown: #8d775f;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Cute Font', cursive; 
            background: var(--bg-color); 
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }

        #app {
            width: 100%; max-width: 412px; height: 90vh;
            background: #fff; position: relative; overflow: hidden;
            border-radius: 30px; border: 8px solid #333;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        #cover-page {
            position: absolute; inset: 0; z-index: 100;
            background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2)), url('다이어리 내부 메모지2.jpg') center/cover;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #cover-page.open { transform: translateY(-100%); }

        .cover-title {
            font-family: 'VT323', monospace; color: white; font-size: 3.5rem;
            text-align: center; line-height: 1.1; margin-bottom: 40px;
            text-shadow: 3px 3px 0px var(--point-green);
        }

        .start-btn {
            background: white; color: var(--point-green); border: 2px dashed var(--point-green);
            padding: 12px 30px; font-size: 1.8rem; border-radius: 50px; cursor: pointer;
            font-family: inherit; transition: 0.3s;
        }
        .start-btn:hover { transform: scale(1.1); background: var(--point-green); color: white; }

        #main-diary {
            width: 100%; height: 100%; padding: 40px 25px;
            background: linear-gradient(rgba(252, 250, 242, 0.83), rgba(244, 241, 234, 0.9)), url('다이어리 외부c..jpg') center/cover;
            overflow-y: auto; display: flex; flex-direction: column; padding-bottom: 100px;
        }

        .tape {
            width: 100px; height: 30px; background: rgba(181, 201, 154, 0.6);
            margin: -20px auto 20px; transform: rotate(-2deg); box-shadow: 1px 1px 3px rgba(0,0,0,0.1);
        }

        .diary-content {
            flex-grow: 1; border: 1px solid rgba(0,0,0,0.05); padding: 15px; border-radius: 10px;
        }

        h2 { color: var(--point-green); font-size: 2.5rem; border-bottom: 1px dashed #ccc; margin-bottom: 20px; }

        textarea {
            width: 100%; height: 350px; background: transparent; border: none;
            font-family: inherit; font-size: 1.6rem; line-height: 1.8; outline: none;
            background-image: linear-gradient(#eee 1px, transparent 1px); background-size: 100% 1.8rem;
        }

        nav {
            position: absolute; bottom: 10px; width: 100%;
            display: flex; justify-content: space-around; padding: 0 10px;
            background: rgba(255,255,255,0.8); padding-top: 10px;
        }
        .stamp-btn {
            width: 60px; height: 75px; background: white; border: 1px solid #ddd;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1); cursor: pointer;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 1rem; transition: 0.3s; text-align: center;
        }
        .stamp-btn:hover { transform: translateY(-5px); border-color: var(--point-green); }

        #loading {
            position: fixed; inset: 0; background: white; z-index: 1000;
            display: flex; justify-content: center; align-items: center; font-size: 2rem;
        }

        /* --- 타임 트래커(공부 로그) 스타일 --- */
        #study-container { display: none; flex-direction: column; gap: 15px; }
        .study-input-area { display: flex; flex-direction: column; gap: 8px; background: rgba(255,255,255,0.4); padding: 10px; border-radius: 10px; border: 1px dashed var(--point-green); }
        .study-input-row { display: flex; gap: 5px; }
        .study-input-row input { flex: 1; border: none; border-bottom: 1px solid var(--point-green); background: transparent; font-family: inherit; font-size: 1.2rem; outline: none; }
        #add-study-btn { background: var(--point-green); color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
        
        #study-list { list-style: none; display: flex; flex-direction: column; gap: 15px; }
        .study-item { background: white; padding: 12px; border-radius: 15px; box-shadow: 2px 2px 8px rgba(0,0,0,0.05); position: relative; }
        .study-subject { font-size: 1rem; color: var(--accent-brown); font-weight: bold; margin-bottom: 5px; }
        .study-task { font-size: 1.5rem; margin-bottom: 10px; }
        .progress-stamps { display: flex; gap: 5px; flex-wrap: wrap; min-height: 30px; padding: 5px; background: #fdfbf7; border-radius: 8px; }
        .stamp-emoji { font-size: 1.4rem; animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .stamp-selector { display: flex; gap: 8px; margin-top: 10px; border-top: 1px dotted #eee; padding-top: 8px; }
        .pick-stamp { cursor: pointer; font-size: 1.2rem; filter: grayscale(1); transition: 0.2s; }
        .pick-stamp:hover { filter: grayscale(0); transform: scale(1.2); }
        .delete-study { position: absolute; top: 10px; right: 10px; background: none; border: none; color: #ccc; cursor: pointer; }

        @keyframes pop { from { transform: scale(0); } to { transform: scale(1); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* 기존 컨테이너 숨기기용 */
        #todo-container, #wishlist-container { display: none; }
    </style>
</head>
<body>

<div id="loading">(˙ ᵋ ˙ э )Э˖⋆࿐໋ 로딩중...</div>

<div id="app">
    <div id="cover-page">
        <h1 class="cover-title">✴◦◟◌ ͙<br>This is<br>NK's</h1>
        <button class="start-btn" id="entry-btn">Open!</button>
    </div>

    <div id="main-diary">
        <div class="tape"></div>
        <h2 id="page-name">STUDY LOG</h2>
        
        <div class="diary-content">
            <textarea id="editor" style="display:none;" placeholder="(｡- .•)... 적어보아요...."></textarea>
            
            <div id="todo-container">
                <div style="display:flex; gap:10px; margin-bottom:20px;">
                    <input type="text" id="todo-input" style="flex-grow:1; border:none; border-bottom:2px dashed var(--point-green); background:transparent; font-family:inherit; font-size:1.8rem; outline:none;" placeholder="바쁘다 바빠...">
                    <button id="add-todo-btn" style="background:var(--point-green); color:white; border:none; border-radius:50%; width:35px; height:35px;">➕</button>
                </div>
                <ul id="todo-list"></ul>
            </div>

            <div id="wishlist-container">
                <div class="wish-input-form">
                    <input type="text" id="wish-name" placeholder="무엇인고">
                    <button id="add-wish-btn">추가</button>
                </div>
                <ul id="wish-list"></ul>
            </div>

            <div id="study-container" style="display:flex;">
                <div class="study-input-area">
                    <div class="study-input-row">
                        <input type="text" id="study-subject" placeholder="과목명 (예: 알고리즘)">
                        <input type="text" id="study-task" placeholder="할 일 (예: 3강 듣기)">
                    </div>
                    <button id="add-study-btn">공부 리스트에 추가 🌿</button>
                </div>
                <ul id="study-list">
                    </ul>
            </div>
        </div>
    </div>

    <nav>
        <div class="stamp-btn" onclick="changePage('todo')">📋<br>할일</div>
        <div class="stamp-btn" onclick="changePage('study')">📖<br>공부</div>
        <div class="stamp-btn" onclick="changePage('wishlist')">🎁<br>위시</div>
        <div class="stamp-btn" onclick="changePage('memo')">📝<br>메모</div>
    </nav>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    // ❗❗❗ 파이어베이스 설정 넣어줘! ❗❗❗
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT.firebaseapp.com",
        projectId: "YOUR_PROJECT",
        storageBucket: "YOUR_PROJECT.appspot.com",
        messagingSenderId: "YOUR_ID",
        appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let uid = null;
    let currentPage = 'study';
    let currentListener = null;

    // 로딩 해제
    const loading = document.getElementById('loading');
    if(loading) loading.style.display = 'none';

    document.getElementById('entry-btn').onclick = () => {
        document.getElementById('cover-page').classList.add('open');
    };

    signInAnonymously(auth);
    onAuthStateChanged(auth, (user) => {
        if (user) { uid = user.uid; changePage('study'); }
    });

    // --- 📖 타임 트래커(공부로그) 기능 ---
    async function addStudyTask() {
        const subEl = document.getElementById('study-subject');
        const taskEl = document.getElementById('study-task');
        if(!subEl.value || !taskEl.value || !uid) return;

        const docRef = doc(db, "diaries", uid, "pages", "study");
        const docSnap = await getDoc(docRef);
        let studies = docSnap.exists() ? docSnap.data().items || [] : [];
        
        studies.push({
            subject: subEl.value,
            task: taskEl.value,
            stamps: [],
            id: Date.now()
        });

        await setDoc(docRef, { items: studies });
        subEl.value = ''; taskEl.value = '';
    }

    window.addStamp = async (studyId, emoji) => {
        const docRef = doc(db, "diaries", uid, "pages", "study");
        const docSnap = await getDoc(docRef);
        if (docSnap.exists()) {
            let studies = docSnap.data().items || [];
            const idx = studies.findIndex(s => s.id === studyId);
            if(idx > -1) {
                studies[idx].stamps.push(emoji);
                await setDoc(docRef, { items: studies });
            }
        }
    };

    window.deleteStudy = async (studyId) => {
        const docRef = doc(db, "diaries", uid, "pages", "study");
        const docSnap = await getDoc(docRef);
        if (docSnap.exists()) {
            let studies = docSnap.data().items || [];
            const filtered = studies.filter(s => s.id !== studyId);
            await setDoc(docRef, { items: filtered });
        }
    };

    function renderStudyLog(items) {
        const listEl = document.getElementById('study-list');
        listEl.innerHTML = '';
        items.forEach(item => {
            const li = document.createElement('li');
            li.className = 'study-item';
            li.innerHTML = `
                <button class="delete-study" onclick="deleteStudy(${item.id})">×</button>
                <div class="study-subject">${item.subject}</div>
                <div class="study-task">${item.task}</div>
                <div class="progress-stamps">
                    ${item.stamps.map(s => `<span class="stamp-emoji">${s}</span>`).join('')}
                </div>
                <div class="stamp-selector">
                    <span class="pick-stamp" onclick="addStamp(${item.id}, '🌱')">🌱</span>
                    <span class="pick-stamp" onclick="addStamp(${item.id}, '🌿')">🌿</span>
                    <span class="pick-stamp" onclick="addStamp(${item.id}, '🌸')">🌸</span>
                    <span class="pick-stamp" onclick="addStamp(${item.id}, '📖')">📖</span>
                    <span class="pick-stamp" onclick="addStamp(${item.id}, '☕')">☕</span>
                </div>
            `;
            listEl.appendChild(li);
        });
    }

    document.getElementById('add-study-btn').onclick = addStudyTask;

    // --- 페이지 전환 & 데이터 로드 ---
    window.changePage = (page) => {
        currentPage = page;
        document.getElementById('page-name').innerText = page.toUpperCase();
        
        const containers = {
            todo: document.getElementById('todo-container'),
            study: document.getElementById('study-container'),
            wishlist: document.getElementById('wishlist-container'),
            memo: document.getElementById('editor')
        };

        Object.values(containers).forEach(c => { if(c) c.style.display = 'none'; });
        if(containers[page]) containers[page].style.display = (page === 'memo') ? 'block' : 'flex';

        if (currentListener) currentListener();
        currentListener = onSnapshot(doc(db, "diaries", uid, "pages", page), (docSnap) => {
            const data = docSnap.exists() ? docSnap.data() : {};
            if (page === 'study') renderStudyLog(data.items || []);
            else if (page === 'todo') /* 기존 투두 렌더링 함수 호출 */ ;
            else if (page === 'memo') containers.memo.value = data.content || "";
        });
    };
</script>
</body>
</html>
