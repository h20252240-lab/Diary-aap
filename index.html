<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cottagecore Diary</title>
    <link href="https://fonts.googleapis.com/css2?family=Cute+Font&family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #e8e4d9; /* 빈티지 베이지 */
            --point-green: #5d7c5a; /* 잔디색 */
            --paper-texture: url('https://www.transparenttextures.com/patterns/natural-paper.png');
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Cute Font', cursive; 
            background: var(--bg-color); 
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }

        /* 메인 컨테이너: 스마트폰 비율 */
        #app {
            width: 100%; max-width: 412px; height: 90vh;
            background: #fff; position: relative; overflow: hidden;
            border-radius: 30px; border: 8px solid #333; /* 폰 케이스 느낌 */
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        /* --- 1. 표지 (감성 디자인) --- */
        #cover-page {
            position: absolute; inset: 0; z-index: 100;
            background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2)), url('다이어리 내부 메모지2.jpg') center/cover;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #cover-page.open { transform: translateY(-100%); }

        .cover-title {
            font-family: 'VT323', monospace; color: white; font-size: 3.5rem;
            text-align: center; line-height: 1.1; margin-bottom: 40px;
            text-shadow: 3px 3px 0px var(--point-green);
        }

        .start-btn {
            background: white; color: var(--point-green); border: 2px dashed var(--point-green);
            padding: 12px 30px; font-size: 1.8rem; border-radius: 50px; cursor: pointer;
            font-family: inherit; transition: 0.3s;
        }
        .start-btn:hover { transform: scale(1.1); background: var(--point-green); color: white; }

        /* --- 2. 다이어리 내지 (실제 구현) --- */
        #main-diary {
    width: 100%; height: 100%; padding: 40px 25px;
    /* 💡 여기에 네가 저장해둔 내지 이미지 파일명을 적어줘! (예: 다이어리 내부a.jpg) */
    background: linear-gradient(rgba(252, 250, 242, 0.92), rgba(244, 241, 234, 0.9)), url('다이어리 외부c..jpg') center/cover;
    overflow-y: auto; display: flex; flex-direction: column;
}

        /* 마스킹 테이프 효과 */
        .tape {
            width: 100px; height: 30px; background: rgba(181, 201, 154, 0.6);
            margin: -20px auto 20px; transform: rotate(-2deg); box-shadow: 1px 1px 3px rgba(0,0,0,0.1);
        }

        .diary-content {
            flex-grow: 1; border: 1px solid rgba(0,0,0,0.05); padding: 15px; border-radius: 10px;
        }

        h2 { color: var(--point-green); font-size: 2.5rem; border-bottom: 1px dashed #ccc; margin-bottom: 20px; }

        /* 입력 영역 */
        textarea {
            width: 100%; height: 350px; background: transparent; border: none;
            font-family: inherit; font-size: 1.6rem; line-height: 1.8; outline: none;
            background-image: linear-gradient(#eee 1px, transparent 1px); background-size: 100% 1.8rem;
        }

        /* --- 3. 우표 메뉴 --- */
        nav {
            position: absolute; bottom: 20px; width: 100%;
            display: flex; justify-content: space-around; padding: 0 20px;
        }
        .stamp {
            width: 65px; height: 80px; background: white; border: 1px solid #ddd;
            box-shadow: 3px 3px 10px rgba(0,0,0,0.1); cursor: pointer;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 1.1rem; transition: 0.3s;
        }
        .stamp:hover { transform: translateY(-10px) rotate(5deg); }
        .stamp img { width: 40px; margin-bottom: 5px; }

        /* 로딩 화면 */
        #loading {
            position: fixed; inset: 0; background: white; z-index: 1000;
            display: flex; justify-content: center; align-items: center; font-size: 2rem;
/* --- 🌟 할일 목록(To-Do) 전용 스타일 --- */
#todo-container { display: none; flex-direction: column; height: 100%; }
.todo-input-area { display: flex; gap: 10px; margin-bottom: 20px; }

#todo-input { 
    flex-grow: 1; border: none; border-bottom: 2px dashed var(--point-green); 
    background: transparent; font-family: inherit; font-size: 1.8rem; 
    outline: none; padding: 5px; color: #333;
}

#add-todo-btn { 
    background: var(--point-green); color: white; border: none; 
    border-radius: 50%; width: 35px; height: 35px; font-size: 1.5rem; 
    cursor: pointer; box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
}

#todo-list { list-style: none; overflow-y: auto; flex-grow: 1; }

.todo-item { 
    display: flex; align-items: center; gap: 12px; 
    font-size: 1.8rem; margin-bottom: 12px; padding-bottom: 8px; 
    border-bottom: 1px solid rgba(0,0,0,0.05); animation: fadeIn 0.3s ease;
}

.todo-item input[type="checkbox"] { 
    transform: scale(1.3); accent-color: var(--point-green); cursor: pointer; 
}

@keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }       
 }
    </style>
</head>
<body>

<div id="loading">(˙ ᵋ ˙ э )Э˖⋆࿐໋</div>

<div id="app">
    <div id="cover-page">
        <h1 class="cover-title">✴◦◟◌ ͙<br>This is<br>NK's</h1>
        <button class="start-btn" id="entry-btn">Open!</button>
    </div>

    <div id="main-diary">
        <div class="tape"></div>
        <h2 id="page-name">To-Do List</h2>
        <div class="diary-content">
    <textarea id="editor" placeholder="(｡- .•)"></textarea>
    
    <div id="todo-container">
        <div class="todo-input-area">
            <input type="text" id="todo-input" placeholder="오늘은 무슨 일이 생겨날까~…“〆(・ε・*)">
            <button id="add-todo-btn">➕</button>
        </div>
        <ul id="todo-list"></ul>
    </div>
</div>

    <nav>
        <div class="stamp" onclick="changePage('todo')"> ✓<br>할 일</div>
        <div class="stamp" onclick="changePage('weekly')">✴ ͙ <br>메모</div>
        <div class="stamp" onclick="changePage('memo')">복습<br>진도</div>
    </nav>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    // getDoc이 추가로 필요해서 임포트 목록이 늘어났어!
    import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    // ❗ 여기에 네 파이어베이스 설정값 꼭 다시 덮어쓰기!
const firebaseConfig = {
  apiKey: "AIzaSyDyS13a742QxkQZnDTXs7vWysTL1lhEfXU",
  authDomain: "diary-app-bcd82.firebaseapp.com",
  projectId: "diary-app-bcd82",
  storageBucket: "diary-app-bcd82.firebasestorage.app",
  messagingSenderId: "925531726073",
  appId: "1:925531726073:web:85640d386e62d2059b0228"
};

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let uid = null;
    let currentPage = 'todo';
    
    const editor = document.getElementById('editor');
    const todoContainer = document.getElementById('todo-container');
    const todoInput = document.getElementById('todo-input');
    const todoList = document.getElementById('todo-list');

    window.onload = () => document.getElementById('loading').style.display = 'none';

    document.getElementById('entry-btn').onclick = () => {
        document.getElementById('cover-page').classList.add('open');
    };

    signInAnonymously(auth).catch(err => alert("파이어베이스 오류: " + err.message));

    onAuthStateChanged(auth, (user) => {
        if (user) {
            uid = user.uid;
            changePage('todo'); // 로그인 완료되면 무조건 할일 탭부터 로드
        }
    });

    // --- 🌟 추가됨: 할 일 목록 화면에 그리기 ---
    function renderTodoList(tasks) {
        todoList.innerHTML = '';
        tasks.forEach((task, index) => {
            const li = document.createElement('li');
            li.className = 'todo-item';
            // 체크박스를 누르면 deleteTask 함수가 실행되게 연결
            li.innerHTML = `
                <input type="checkbox" onchange="deleteTask(${index})">
                <span>${task}</span>
            `;
            todoList.appendChild(li);
        });
    }

    // --- 데이터 실시간 불러오기 ---
    function loadData(page) {
        if (!uid) return;
        onSnapshot(doc(db, "diaries", uid, "pages", page), (docSnap) => {
            if (page === 'todo') {
                const tasks = docSnap.exists() ? docSnap.data().tasks || [] : [];
                renderTodoList(tasks);
            } else {
                editor.value = docSnap.exists() ? docSnap.data().content || "" : "";
            }
        });
    }

    // --- 메모장 자동 저장 ---
    editor.oninput = () => {
        if (!uid || currentPage === 'todo') return;
        setDoc(doc(db, "diaries", uid, "pages", currentPage), {
            content: editor.value,
            time: new Date()
        });
    };

    // --- 🌟 추가됨: 할 일 배열 통째로 저장 ---
    async function saveTasks(tasks) {
        if (!uid) return;
        await setDoc(doc(db, "diaries", uid, "pages", "todo"), {
            tasks: tasks,
            time: new Date()
        });
    }

    // --- 🌟 추가됨: 할 일 새로 등록하기 ---
    async function addTask() {
        const text = todoInput.value.trim();
        if (!text || !uid) return;
        
        const docRef = doc(db, "diaries", uid, "pages", "todo");
        const docSnap = await getDoc(docRef);
        let tasks = docSnap.exists() ? docSnap.data().tasks || [] : [];
        
        tasks.push(text); // 배열에 새 항목 추가
        await saveTasks(tasks);
        todoInput.value = ''; // 입력창 비우기
    }

    document.getElementById('add-todo-btn').onclick = addTask;
    todoInput.onkeypress = (e) => { if(e.key === 'Enter') addTask(); }; // 엔터키 지원!

    // --- 🌟 추가됨: 체크 시 할 일 즉시 삭제 ---
    window.deleteTask = async (index) => {
        const docRef = doc(db, "diaries", uid, "pages", "todo");
        const docSnap = await getDoc(docRef);
        if (docSnap.exists()) {
            let tasks = docSnap.data().tasks || [];
            tasks.splice(index, 1); // 배열에서 체크된 항목 1개 삭제
            await saveTasks(tasks); // 삭제된 배열 다시 저장
        }
    };

    // --- 페이지 탭 전환 시 화면 토글 ---
    window.changePage = (page) => {
        currentPage = page;
        document.getElementById('page-name').innerText = page.toUpperCase();
        
        // 투두 탭이면 메모장 숨기고 투두 리스트 켜기
        if (page === 'todo') {
            editor.style.display = 'none';
            todoContainer.style.display = 'flex';
        } else {
            todoContainer.style.display = 'none';
            editor.style.display = 'block';
        }
        
        loadData(page);
    };
</script>
</body>
</html>
