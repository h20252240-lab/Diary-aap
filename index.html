<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vintage Online Diary</title>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --vintage-green: #556b2f;
            --paper-color: #fcfaf2;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Nanum Pen Script', cursive; background: #ddd; display: flex; justify-content: center; }

        #app {
            width: 100%; max-width: 420px; height: 100vh;
            background: white; position: relative; overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }

        /* --- 1. 표지 (image_0, 1 기반) --- */
        #cover-page {
            position: absolute; inset: 0; z-index: 20;
            background: url('다이어리 외부a..jpg') center/cover; /* 실제 파일명 확인 */
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .lace { width: 100%; height: 60px; opacity: 0.8; }
        .lace.top { background: url('다이어리 내부c..jpg') top/contain no-repeat; position: absolute; top: 0; }
        .lace.bottom { background: url('lace_bottom.png') bottom/contain no-repeat; position: absolute; bottom: 0; }
        
        .title-cross {
            font-family: 'VT323', monospace; color: white; font-size: 3rem;
            text-align: center; text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            margin: 20px;
        }

        #login-btn {
            padding: 10px 25px; border: 2px dashed white; background: rgba(255,255,255,0.2);
            color: white; font-size: 1.5rem; cursor: pointer; border-radius: 15px;
            backdrop-filter: blur(5px);
        }

        /* --- 2. 내지 (image_2, 3 기반) --- */
        #main-page {
            display: none; width: 100%; height: 100%;
            background: url('image_a0c683.jpg') center/cover; /* 종이질감 배경 */
            padding: 40px 20px 100px; overflow-y: auto;
        }

        .page-container {
            background: rgba(255, 255, 255, 0.6); padding: 20px;
            border-radius: 10px; border: 1px dashed #aaa; min-height: 70vh;
        }

        .todo-item {
            display: flex; align-items: center; gap: 10px; font-size: 1.8rem; margin-bottom: 10px;
        }
        .todo-item input[type="checkbox"] { transform: scale(1.5); accent-color: var(--vintage-green); }

        textarea#memo-area {
            width: 100%; height: 50vh; background: transparent; border: none;
            font-family: inherit; font-size: 1.6rem; outline: none; line-height: 1.5;
        }

        /* --- 3. 하단 우표 메뉴 (image_3 기반) --- */
        nav {
            position: absolute; bottom: 0; width: 100%; height: 90px;
            background: rgba(255,255,255,0.8); display: flex; justify-content: space-around;
            align-items: center; border-top: 1px dashed #888; z-index: 10;
        }
        .stamp {
            width: 60px; height: 70px; background: white; border: 2px dotted #999;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1); cursor: pointer;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .stamp:nth-child(odd) { transform: rotate(-3deg); }
        .stamp:nth-child(even) { transform: rotate(3deg); }
    </style>
</head>
<body>

<div id="app">
    <div id="cover-page">
        <div class="lace top"></div>
        <h1 class="title-cross">Hold Space for the Becoming</h1>
        <button id="login-btn">Diary Start ⭐</button>
        <div class="lace bottom"></div>
    </div>

    <div id="main-page">
        <div class="page-container" id="content">
            <h2 id="page-title">To-Do List</h2>
            <div id="data-area">
                </div>
        </div>
    </div>

    <nav id="navbar" style="display: none;">
        <div class="stamp" onclick="showPage('todo')"><span>📝</span><span>할일</span></div>
        <div class="stamp" onclick="showPage('weekly')"><span>📅</span><span>주간</span></div>
        <div class="stamp" onclick="showPage('tracker')"><span>⏳</span><span>기록</span></div>
        <div class="stamp" onclick="showPage('memo')"><span>💭</span><span>메모</span></div>
    </nav>
</div>

</body>
</html>
