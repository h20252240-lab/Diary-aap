<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cottagecore Diary & Study Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Cute+Font&family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #e8e4d9;
            --point-green: #5d7c5a;
            --accent-brown: #8d775f;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Cute Font', cursive; 
            background: var(--bg-color); 
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }

        #app {
            width: 100%; max-width: 412px; height: 90vh;
            background: #fff; position: relative; overflow: hidden;
            border-radius: 30px; border: 8px solid #333;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        /* 화면 너비가 600px 이하(일반적인 폰)일 때만 적용되는 스타일 */
@media (max-width: 600px) {
    body {
        align-items: flex-start; /* 위쪽부터 꽉 차게 배치 */
    }

    #app {
        width: 100vw;       /* 화면 너비 100% */
        height: 100dvh;     /* 주소창 제외한 실제 화면 높이 100% */
        max-width: none;    /* 가로 제한 해제 */
        border: none;       /* 검정색 폰 케이스 테두리 제거 */
        border-radius: 0;   /* 둥근 모서리 제거 */
        box-shadow: none;   /* 그림자 제거 */
    }

    #main-diary {
        height: 100%;       /* 내부 컨텐츠도 꽉 차게 */
        padding-bottom: 120px; /* 하단 메뉴 안 가려지게 여백 확보 */
    }

    #cover-page {
        border-radius: 0;   /* 표지도 꽉 차게 */
    }
}

        /* --- 1. 표지 --- */
        #cover-page {
            position: absolute; inset: 0; z-index: 100;
            background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2)), url('초여름 나무.jpg') center/cover;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #cover-page.open { transform: translateY(-100%); }

.cover-title {
            font-family: 'VT323', monospace; 
            color: rgba(255, 255, 255, 0.83); /* ✨ 흰색을 살짝 투명하게 (0.85) */
            font-size: 3.5rem;
            text-align: center; line-height: 1.1; margin-bottom: 40px;
            /* ✨ 그림자도 기존 색상에서 살짝 투명하게 조절했어! */
            text-shadow: 3px 3px 0px rgba(93, 124, 90, 0.6); 
        }

.start-btn {
            /* 1. 배경색 투명도 (흰색을 60% 정도만 채움) */
            background: rgba(255, 255, 255, 0.5); 
            
            /* 2. 글자색 투명도 (초록색을 80% 농도로) */
            color: rgba(93, 124, 90, 0.8); 
            
            /* 3. 테두리 투명도 (초록색 점선을 50% 농도로) */
            border: 2px dashed rgba(93, 124, 90, 0.5); 
            
            padding: 12px 30px; 
            font-size: 1.8rem; 
            border-radius: 50px; 
            cursor: pointer;
            font-family: inherit; 
            transition: 0.3s;
            
            /* (선택사항) 뒤 배경을 살짝 흐리게 만들면 더 고급스러워 보여! */
            backdrop-filter: blur(3px); 
        }

        .start-btn:hover { 
            transform: scale(1.1); 
            /* 마우스 올렸을 때는 다시 진하게 보이도록 설정했어 */
            background: var(--point-green); 
            color: white; 
            border-style: solid;
        }
        .start-btn:hover { transform: scale(1.1); background: var(--point-green); color: white; }
        /* --- 2. 다이어리 내지 --- */
        #main-diary {
            width: 100%; height: 100%; padding: 40px 25px;
            background: linear-gradient(rgba(252, 250, 242, 0.80), rgba(244, 241, 234, 0.9)), url('다이어리 외부c..jpg') center/cover;
            overflow-y: auto; display: flex; flex-direction: column; padding-bottom: 110px;
        }

        .tape {
            width: 100px; height: 30px; background: rgba(181, 201, 154, 0.6);
            margin: -20px auto 20px; transform: rotate(-2deg); box-shadow: 1px 1px 3px rgba(0,0,0,0.1);
        }

        .diary-content {
            flex-grow: 1; border: 1px solid rgba(0,0,0,0.05); padding: 15px; border-radius: 10px;
        }

        h2 { color: var(--point-green); font-size: 2.5rem; border-bottom: 1px dashed #ccc; margin-bottom: 20px; }

        /* --- 로딩 화면 --- */
        #loading {
            position: fixed; inset: 0; background: white; z-index: 1000;
            display: flex; justify-content: center; align-items: center; font-size: 2rem;
        }

        /* --- 메모장 --- */
        textarea {
            width: 100%; height: 350px; background: transparent; border: none;
            font-family: inherit; font-size: 1.6rem; line-height: 1.8; outline: none;
            background-image: linear-gradient(#eee 1px, transparent 1px); background-size: 100% 1.8rem;
        }

        /* --- 투두 스타일 --- */
        #todo-container { display: none; flex-direction: column; height: 100%; }
        .todo-input-area { display: flex; gap: 10px; margin-bottom: 20px; }
        #todo-input { flex-grow: 1; border: none; border-bottom: 2px dashed var(--point-green); background: transparent; font-family: inherit; font-size: 1.8rem; outline: none; padding: 5px; color: #333; }
        #add-todo-btn { background: var(--point-green); color: white; border: none; border-radius: 50%; width: 35px; height: 35px; font-size: 1.5rem; cursor: pointer; box-shadow: 2px 2px 5px rgba(0,0,0,0.1); }
        #todo-list { list-style: none; overflow-y: auto; flex-grow: 1; }
        .todo-item { display: flex; align-items: center; gap: 12px; font-size: 1.8rem; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid rgba(0,0,0,0.05); animation: fadeIn 0.3s ease; }
        .todo-item input[type="checkbox"] { transform: scale(1.3); accent-color: var(--point-green); cursor: pointer; }

        /* --- 위시리스트 스타일 --- */
        #wishlist-container { display: none; flex-direction: column; gap: 20px; }
        .wish-input-form { background: rgba(255, 255, 255, 0.5); padding: 15px; border-radius: 15px; border: 1px dashed var(--point-green); display: flex; flex-direction: column; gap: 10px; }
        .wish-input-form input { border: none; background: transparent; border-bottom: 1px solid #ddd; padding: 5px; font-family: inherit; outline: none; }
        #wish-list { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; list-style: none; }
        .wish-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 3px 3px 10px rgba(0,0,0,0.05); position: relative; animation: fadeIn 0.4s ease; }
        .wish-card img { width: 100%; height: 120px; object-fit: cover; background: #eee; }
        .wish-info { padding: 10px; display: flex; flex-direction: column; gap: 4px; }
        .wish-name { font-weight: bold; font-size: 1.2rem; color: var(--point-green); }
        .wish-price { font-size: 0.9rem; color: #888; }
        .wish-reason { font-size: 1rem; color: #555; line-height: 1.2; }
        .delete-wish { position: absolute; top: 5px; right: 5px; background: rgba(0,0,0,0.3); color: white; border: none; border-radius: 50%; cursor: pointer; width: 20px; height: 20px; }

        /* --- 타임 트래커(공부 로그) 스타일 --- */
        #study-container { display: none; flex-direction: column; gap: 15px; }
        .study-input-area { display: flex; flex-direction: column; gap: 8px; background: rgba(255,255,255,0.4); padding: 10px; border-radius: 10px; border: 1px dashed var(--point-green); }
        .study-input-row { display: flex; gap: 5px; }
        .study-input-row input { flex: 1; border: none; border-bottom: 1px solid var(--point-green); background: transparent; font-family: inherit; font-size: 1.2rem; outline: none; }
        #add-study-btn { background: var(--point-green); color: white; border: none; padding: 8px; border-radius: 8px; cursor: pointer; font-family: inherit; font-size: 1.2rem; }
        #study-list { list-style: none; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; }
        .study-item { background: white; padding: 12px; border-radius: 15px; box-shadow: 2px 2px 8px rgba(0,0,0,0.05); position: relative; animation: fadeIn 0.4s ease; }
        .study-subject { font-size: 1.1rem; color: var(--accent-brown); font-weight: bold; margin-bottom: 5px; }
        .study-task { font-size: 1.5rem; margin-bottom: 10px; }
        .progress-stamps { display: flex; gap: 5px; flex-wrap: wrap; min-height: 35px; padding: 5px; background: #fdfbf7; border-radius: 8px; border: 1px solid #eee; }
        .stamp-emoji { font-size: 1.4rem; animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .stamp-selector { display: flex; justify-content: space-around; margin-top: 10px; border-top: 1px dotted #ccc; padding-top: 8px; }
        .pick-stamp { cursor: pointer; font-size: 1.3rem; filter: grayscale(1); transition: 0.2s; }
        .pick-stamp:hover { filter: grayscale(0); transform: scale(1.2); }
        .delete-study { position: absolute; top: 10px; right: 10px; background: none; border: none; color: #ccc; cursor: pointer; font-size: 1.2rem; }

        @keyframes pop { from { transform: scale(0); } to { transform: scale(1); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }

        /* --- 3. 하단 메뉴 --- */
        nav {
            position: absolute; bottom: 10px; width: 100%;
            display: flex; justify-content: space-around; padding: 0 10px;
            background: rgba(255,255,255,0.7); padding-top: 10px; border-radius: 20px 20px 0 0;
        }
        .stamp-btn {
            width: 60px; height: 75px; background: white; border: 1px solid #ddd;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1); cursor: pointer;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 1.1rem; transition: 0.3s; text-align: center; border-radius: 8px;
        }
        .stamp-btn:hover { transform: translateY(-5px); border-color: var(--point-green); }
    </style>
</head>
<body>

<div id="loading">(˙ ᵋ ˙ э )Э˖⋆࿐໋ 로딩중...</div>

<div id="app">
    <div id="cover-page">
        <h1 class="cover-title">✴◦◟◌ ͙<br>My Dairy<br>in summer.</h1>
        <button class="start-btn" id="entry-btn">Open!</button>
    </div>

    <div id="main-diary">
        <div class="tape"></div>
        <h2 id="page-name">TO-DO LIST</h2>
        
        <div class="diary-content">
            <textarea id="editor" placeholder="(｡- .•)... 적어보아요...."></textarea>
            
            <div id="todo-container">
                <div class="todo-input-area">
                    <input type="text" id="todo-input" placeholder="바쁘다 바빠(๑´灬`๑)...">
                    <button id="add-todo-btn">➕</button>
                </div>
                <ul id="todo-list"></ul>
            </div>

            <div id="wishlist-container">
                <div class="wish-input-form">
                    <input type="text" id="wish-name" placeholder="무엇인고">
                    <input type="text" id="wish-price" placeholder="얼마인가">
                    <input type="text" id="wish-reason" placeholder="이건 나에 것이야 왜냐면. (՞⋅֊⋅՞)">
                    <input type="file" id="wish-file" accept="image/*" style="font-size: 0.8rem;">
                    <button id="add-wish-btn" style="background: var(--point-green); color: white; border: none; padding: 8px; border-radius: 8px; cursor: pointer;">위시리스트 추가~₍ᐢ..ᐢ₎⊹</button>
                </div>
                <ul id="wish-list"></ul>
            </div>

            <div id="study-container">
                <div class="study-input-area">
                    <div class="study-input-row">
                        <input type="text" id="study-subject" placeholder="과목명 (예: 전공강의)">
                        <input type="text" id="study-task" placeholder="할 일 (예: 3주차 복습)">
                    </div>
                    <button id="add-study-btn">할 수 있다 다 부셔⚝(๑⚈ ․̫ ⚈๑)∩</button>
                </div>
                <ul id="study-list"></ul>
            </div>
        </div>
    </div> <nav>
        <div class="stamp-btn" onclick="changePage('todo')">˗ˋˏϟˎˊ˗<br>할 일</div>
        <div class="stamp-btn" onclick="changePage('study')">✌( ・ ・ )<br>공부</div>
        <div class="stamp-btn" onclick="changePage('wishlist')">나애<br>위시wish</div>
        <div class="stamp-btn" onclick="changePage('memo')">✴ ͙ <br>메모</div>
    </nav>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    // ❗❗ 여기에 네 파이어베이스 API 키 꼭 다시 넣어줘!! ❗❗
const firebaseConfig = {
  apiKey: "AIzaSyDyS13a742QxkQZnDTXs7vWysTL1lhEfXU",
  authDomain: "diary-app-bcd82.firebaseapp.com",
  projectId: "diary-app-bcd82",
  storageBucket: "diary-app-bcd82.firebasestorage.app",
  messagingSenderId: "925531726073",
  appId: "1:925531726073:web:85640d386e62d2059b0228"
};

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let uid = null;
    let currentPage = 'todo';
    let currentListener = null;

    // 로딩 화면 제거
    const loading = document.getElementById('loading');
    if(loading) loading.style.display = 'none';
    setTimeout(() => { if(loading) loading.style.display = 'none'; }, 500);

    const entryBtn = document.getElementById('entry-btn');
    if(entryBtn) {
        entryBtn.onclick = () => {
            const cover = document.getElementById('cover-page');
            if(cover) cover.classList.add('open');
        };
    }

    signInAnonymously(auth).catch(err => {
        console.log("로그인 에러:", err);
        alert("파이어베이스 설정(API 키)을 확인해주세요!"); 
    });

    onAuthStateChanged(auth, (user) => {
        if (user) { uid = user.uid; changePage('todo'); }
    });

    // --- 할일 ---
    function renderTodoList(tasks) {
        const todoList = document.getElementById('todo-list');
        if(!todoList) return;
        todoList.innerHTML = '';
        tasks.forEach((task, index) => {
            const li = document.createElement('li');
            li.className = 'todo-item';
            li.innerHTML = `<input type="checkbox" onchange="deleteTask(${index})"> <span>${task}</span>`;
            todoList.appendChild(li);
        });
    }

    async function addTask() {
        const todoInput = document.getElementById('todo-input');
        const text = todoInput ? todoInput.value.trim() : "";
        if (!text || !uid) return;
        const docRef = doc(db, "diaries", uid, "pages", "todo");
        const docSnap = await getDoc(docRef);
        let tasks = docSnap.exists() ? docSnap.data().tasks || [] : [];
        tasks.push(text);
        await setDoc(docRef, { tasks: tasks, time: new Date() });
        if(todoInput) todoInput.value = '';
    }

    const addTodoBtn = document.getElementById('add-todo-btn');
    if(addTodoBtn) addTodoBtn.onclick = addTask;
    
    document.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && currentPage === 'todo' && document.activeElement.id === 'todo-input') addTask();
    });

    window.deleteTask = async (index) => {
        const docRef = doc(db, "diaries", uid, "pages", "todo");
        const docSnap = await getDoc(docRef);
        if (docSnap.exists()) {
            let tasks = docSnap.data().tasks || [];
            tasks.splice(index, 1);
            await setDoc(docRef, { tasks: tasks });
        }
    };

    // --- 메모 ---
    const editor = document.getElementById('editor');
    if(editor) {
        editor.oninput = () => {
            if (!uid || currentPage !== 'memo') return;
            setDoc(doc(db, "diaries", uid, "pages", "memo"), { content: editor.value, time: new Date() });
        };
    }

    // --- 위시리스트 ---
    function renderWishList(items) {
        const wishList = document.getElementById('wish-list');
        if(!wishList) return;
        wishList.innerHTML = '';
        items.forEach((item, index) => {
            const li = document.createElement('li');
            li.className = 'wish-card';
            li.innerHTML = `
                <button class="delete-wish" onclick="deleteWish(${index})">×</button>
                <img src="${item.image || ''}" alt="wish item">
                <div class="wish-info">
                    <div class="wish-name">${item.name}</div>
                    <div class="wish-price">${item.price}</div>
                    <div class="wish-reason">${item.reason}</div>
                </div>
            `;
            wishList.appendChild(li);
        });
    }

    const addWishBtn = document.getElementById('add-wish-btn');
    if(addWishBtn) {
        addWishBtn.onclick = async () => {
            const nameEl = document.getElementById('wish-name');
            const priceEl = document.getElementById('wish-price');
            const reasonEl = document.getElementById('wish-reason');
            const fileEl = document.getElementById('wish-file');
            
            const name = nameEl ? nameEl.value : '';
            const price = priceEl ? priceEl.value : '';
            const reason = reasonEl ? reasonEl.value : '';
            const file = fileEl && fileEl.files ? fileEl.files[0] : null;
            
            if(!name || !uid) return;

            const docRef = doc(db, "diaries", uid, "pages", "wishlist");
            const docSnap = await getDoc(docRef);
            let wishes = docSnap.exists() ? docSnap.data().items || [] : [];

            if (file) {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = async () => {
                    wishes.push({ name, price, reason, image: reader.result });
                    await setDoc(docRef, { items: wishes, time: new Date() });
                };
            } else {
                wishes.push({ name, price, reason, image: "" });
                await setDoc(docRef, { items: wishes, time: new Date() });
            }
            
            if(nameEl) nameEl.value = '';
            if(priceEl) priceEl.value = '';
            if(reasonEl) reasonEl.value = '';
        };
    }

    window.deleteWish = async (index) => {
        const docRef = doc(db, "diaries", uid, "pages", "wishlist");
        const docSnap = await getDoc(docRef);
        if (docSnap.exists()) {
            let wishes = docSnap.data().items || [];
            wishes.splice(index, 1);
            await setDoc(docRef, { items: wishes });
        }
    };

    // --- 🌟 타임 트래커 (공부 로그) 기능 ---
    async function addStudyTask() {
        const subEl = document.getElementById('study-subject');
        const taskEl = document.getElementById('study-task');
        if(!subEl.value || !taskEl.value || !uid) return;

        const docRef = doc(db, "diaries", uid, "pages", "study");
        const docSnap = await getDoc(docRef);
        let studies = docSnap.exists() ? docSnap.data().items || [] : [];
        
        studies.push({ subject: subEl.value, task: taskEl.value, stamps: [], id: Date.now() });
        await setDoc(docRef, { items: studies });
        
        subEl.value = ''; taskEl.value = '';
    }

    const addStudyBtn = document.getElementById('add-study-btn');
    if(addStudyBtn) addStudyBtn.onclick = addStudyTask;

    window.addStamp = async (studyId, emoji) => {
        const docRef = doc(db, "diaries", uid, "pages", "study");
        const docSnap = await getDoc(docRef);
        if (docSnap.exists()) {
            let studies = docSnap.data().items || [];
            const idx = studies.findIndex(s => s.id === studyId);
            if(idx > -1) {
                studies[idx].stamps.push(emoji);
                await setDoc(docRef, { items: studies });
            }
        }
    };

    window.deleteStudy = async (studyId) => {
        const docRef = doc(db, "diaries", uid, "pages", "study");
        const docSnap = await getDoc(docRef);
        if (docSnap.exists()) {
            let studies = docSnap.data().items || [];
            const filtered = studies.filter(s => s.id !== studyId);
            await setDoc(docRef, { items: filtered });
        }
    };

    function renderStudyLog(items) {
        const listEl = document.getElementById('study-list');
        if(!listEl) return;
        listEl.innerHTML = '';
        items.forEach(item => {
            const li = document.createElement('li');
            li.className = 'study-item';
            li.innerHTML = `
                <button class="delete-study" onclick="deleteStudy(${item.id})">×</button>
                <div class="study-subject">${item.subject}</div>
                <div class="study-task">${item.task}</div>
                <div class="progress-stamps">
                    ${item.stamps.map(s => `<span class="stamp-emoji">${s}</span>`).join('')}
                </div>
                <div class="stamp-selector">
                    <span class="pick-stamp" onclick="addStamp(${item.id}, '🌱')">🌱</span>
                    <span class="pick-stamp" onclick="addStamp(${item.id}, '🌿')">🌿</span>
                    <span class="pick-stamp" onclick="addStamp(${item.id}, '🌸')">🌸</span>
                    <span class="pick-stamp" onclick="addStamp(${item.id}, '📖')">📖</span>
                    <span class="pick-stamp" onclick="addStamp(${item.id}, '☕')">☕</span>
                </div>
            `;
            listEl.appendChild(li);
        });
    }

    // --- 데이터 로드 & 페이지 전환 ---
    function loadData(page) {
        if (!uid) return;
        if (currentListener) currentListener(); 

        currentListener = onSnapshot(doc(db, "diaries", uid, "pages", page), (docSnap) => {
            const ed = document.getElementById('editor');
            if (page === 'todo') renderTodoList(docSnap.exists() ? docSnap.data().tasks || [] : []);
            else if (page === 'wishlist') renderWishList(docSnap.exists() ? docSnap.data().items || [] : []);
            else if (page === 'study') renderStudyLog(docSnap.exists() ? docSnap.data().items || [] : []);
            else if (ed) ed.value = docSnap.exists() ? docSnap.data().content || "" : "";
        });
    }

    window.changePage = (page) => {
        currentPage = page;
        const pageNameEl = document.getElementById('page-name');
        
        let displayTitle = '';
        if(page === 'todo') displayTitle = 'TO-DO LIST';
        else if(page === 'wishlist') displayTitle = 'WISH LIST';
        else if(page === 'study') displayTitle = 'STUDY LOG';
        else displayTitle = 'MEMO';
        
        if(pageNameEl) pageNameEl.innerText = displayTitle;
        
        const ed = document.getElementById('editor');
        const tc = document.getElementById('todo-container');
        const wc = document.getElementById('wishlist-container');
        const sc = document.getElementById('study-container');
        
        if(ed) ed.style.display = 'none';
        if(tc) tc.style.display = 'none';
        if(wc) wc.style.display = 'none';
        if(sc) sc.style.display = 'none';
        
        if (page === 'todo' && tc) tc.style.display = 'flex';
        else if (page === 'wishlist' && wc) wc.style.display = 'flex';
        else if (page === 'study' && sc) sc.style.display = 'flex';
        else if (ed) ed.style.display = 'block';
        
        loadData(page);
    };
</script>
</body>
</html>
